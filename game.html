<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blade Master: Giant Boss Edition</title>
    <style>
        body {
            margin: 0; padding: 0; overflow: hidden;
            background-color: #5d9e3f;
            font-family: 'Arial Black', sans-serif;
            user-select: none; touch-action: none;
        }
        canvas { display: block; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; color: white; }
        #exp-container { position: absolute; top: 10px; left: 5%; width: 90%; height: 12px; background: rgba(0,0,0,0.3); border-radius: 6px; overflow: hidden; }
        #exp-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #00f2fe, #4facfe); transition: width 0.1s; }
        #stage-info { position: absolute; top: 30px; left: 0; width: 100%; text-align: center; font-size: 18px; text-shadow: 2px 2px #000; }
        #announce { position: absolute; top: 40%; width: 100%; text-align: center; font-size: 50px; font-weight: bold; transform: scale(0); transition: 0.4s cubic-bezier(0.17, 0.89, 0.32, 1.49); text-shadow: 0 0 20px #fff; z-index: 10; }
        .download-footer { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 80%; max-width: 280px; height: 55px; background: linear-gradient(#ffeb3b, #ff9800); border-radius: 30px; border: 4px solid #fff; display: flex; align-items: center; justify-content: center; font-size: 20px; color: #d32f2f; pointer-events: auto; cursor: pointer; font-weight: bold; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translateX(-50%) translateY(0);} 40% {transform: translateX(-50%) translateY(-10px);} }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="exp-container"><div id="exp-bar"></div></div>
        <div id="stage-info">STAGE 1: プリンの森</div>
        <div id="announce">BOSS APPEARED!</div>
        <div class="download-footer" onclick="window.open('https://example.com', '_blank')">🍮 今すぐ無料で遊ぶ</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const expBar = document.getElementById('exp-bar');
        const announce = document.getElementById('announce');
        const stageText = document.getElementById('stage-info');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const WEAPONS = [
            { name: "伝説のバナナ", emoji: "🍌", power: 40, count: 6 },
            { name: "魔王のしゃもじ", emoji: "🥄", power: 25, count: 4 },
            { name: "電動歯ブラシ", emoji: "🪥", power: 15, count: 10 },
            { name: "近所のネギ", emoji: "🌱", power: 10, count: 5 }
        ];

        let player = { x: canvas.width/2, y: canvas.height/2, exp: 0, weapon: WEAPONS[3], angle: 0 };
        let enemies = [];
        let bubbles = [];
        let effects = [];
        let stage = 1;
        let isBossBattle = false;

        class Enemy {
            constructor(isBoss = false) {
                this.isBoss = isBoss;
                this.reset();
            }
            reset() {
                const angle = Math.random() * Math.PI * 2;
                const dist = this.isBoss ? 500 : 400;
                this.x = player.x + Math.cos(angle) * dist;
                this.y = player.y + Math.sin(angle) * dist;
                this.maxHp = this.isBoss ? 2000 : 100; // ボスはより頑丈に
                this.hp = this.maxHp;
                this.size = this.isBoss ? 150 : 35;
                this.emoji = this.isBoss ? "🍮" : "👾";
                this.vx = 0; this.vy = 0;
                this.invul = 0;
            }
            update() {
                // ノックバック適用（雑魚敵のみ）
                this.x += this.vx;
                this.y += this.vy;
                this.vx *= 0.85;
                this.vy *= 0.85;

                // 境界判定
                const margin = this.size / 2;
                if (this.x < margin) { this.x = margin; if(!this.isBoss) this.vx *= -1; }
                if (this.x > canvas.width - margin) { this.x = canvas.width - margin; if(!this.isBoss) this.vx *= -1; }
                if (this.y < margin) { this.y = margin; if(!this.isBoss) this.vy *= -1; }
                if (this.y > canvas.height - margin) { this.y = canvas.height - margin; if(!this.isBoss) this.vy *= -1; }

                // 追跡移動（ボスはノックバックに邪魔されず着実に近づく）
                if (this.invul <= 0) {
                    const dx = player.x - this.x;
                    const dy = player.y - this.y;
                    const d = Math.sqrt(dx*dx + dy*dy);
                    if (d > 5) {
                        this.x += (dx/d) * (this.isBoss ? 1.0 : 2.5);
                        this.y += (dy/d) * (this.isBoss ? 1.0 : 2.5);
                    }
                } else {
                    this.invul--;
                }

                // ヒット判定
                for(let i=0; i<player.weapon.count; i++) {
                    const a = player.angle + (i * Math.PI * 2 / player.weapon.count);
                    const wx = player.x + Math.cos(a) * 110;
                    const wy = player.y + Math.sin(a) * 110;
                    const dist = Math.sqrt((this.x-wx)**2 + (this.y-wy)**2);
                    
                    if(dist < this.size + 10 && this.invul <= 0) this.hit();
                }
            }
            hit() {
                this.hp -= player.weapon.power;
                this.invul = 4;
                
                // ボス以外はノックバック、ボスは動かない
                if (!this.isBoss) {
                    const angle = Math.atan2(this.y - player.y, this.x - player.x);
                    this.vx = Math.cos(angle) * 15;
                    this.vy = Math.sin(angle) * 15;
                }
                
                // エフェクト演出
                addEffect(this.x + (Math.random()-0.5)*40, this.y + (Math.random()-0.5)*40, 
                          this.isBoss ? "💢" : `-${player.weapon.power}`, 
                          this.isBoss ? "#ffeb3b" : "#fff");

                if(this.hp <= 0) {
                    if(this.isBoss) {
                        spawnMassiveBubbles(this.x, this.y);
                        showAnnounce("BOSS DEFEATED!");
                        isBossBattle = false;
                        stage++;
                        stageText.innerText = `STAGE ${stage}: 深淵のサラリーマン`;
                    }
                    player.exp += this.isBoss ? 0 : 25;
                    checkLevelUp();
                    this.reset();
                }
            }
            draw() {
                ctx.save();
                ctx.font = `${this.size}px Arial`;
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                // ボスがダメージを喰らった時に少し震える演出
                const shakeX = this.isBoss && this.invul > 0 ? (Math.random()-0.5)*10 : 0;
                ctx.fillText(this.emoji, this.x + shakeX, this.y);
                
                // HP Bar
                const barW = this.size * 1.1;
                ctx.fillStyle = "rgba(0,0,0,0.6)";
                ctx.fillRect(this.x - barW/2, this.y - this.size/1.2 - 15, barW, 8);
                ctx.fillStyle = this.isBoss ? "#ffeb3b" : "#ff5252";
                ctx.fillRect(this.x - barW/2, this.y - this.size/1.2 - 15, barW * (this.hp/this.maxHp), 8);
                ctx.restore();
            }
        }

        function addEffect(x, y, text, color) { 
            effects.push({ x, y, text, color, life: 1.0 }); 
        }

        function checkLevelUp() {
            expBar.style.width = player.exp + "%";
            if (player.exp >= 100) {
                player.exp = 0;
                if(!isBossBattle) triggerBoss();
            }
        }

        function triggerBoss() {
            isBossBattle = true;
            enemies = [new Enemy(true)];
            showAnnounce("BOSS APPEARED!");
        }

        function spawnMassiveBubbles(x, y) {
            for(let i=0; i<6; i++) {
                const w = WEAPONS[Math.floor(Math.random()*WEAPONS.length)];
                bubbles.push({ x: x + (Math.random()-0.5)*180, y: y + (Math.random()-0.5)*180, weapon: w, t: Math.random()*5 });
            }
            for(let i=0; i<8; i++) enemies.push(new Enemy(false));
        }

        function showAnnounce(txt) {
            announce.innerText = txt;
            announce.style.transform = "scale(1)";
            setTimeout(() => { announce.style.transform = "scale(0)"; }, 2000);
        }

        // Init
        for(let i=0; i<8; i++) enemies.push(new Enemy(false));

        function loop() {
            ctx.fillStyle = "#5d9e3f";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // バブル描画
            bubbles.forEach((b, i) => {
                b.t += 0.05;
                ctx.beginPath();
                ctx.arc(b.x, b.y, 42 + Math.sin(b.t)*5, 0, Math.PI*2);
                ctx.fillStyle = "rgba(255,255,255,0.3)"; ctx.fill();
                ctx.strokeStyle = "#fff"; ctx.stroke();
                ctx.font = "30px Arial"; ctx.fillText(b.weapon.emoji, b.x-15, b.y+10);
                if(Math.sqrt((player.x-b.x)**2 + (player.y-b.y)**2) < 65) {
                    player.weapon = b.weapon;
                    showAnnounce(b.weapon.name + "!");
                    bubbles.splice(i, 1);
                }
            });

            // 武器の回転（0.05まで低速化して視認性アップ）
            player.angle += 0.05; 
            
            enemies.forEach(e => { e.update(); e.draw(); });
            
            // プレイヤー
            ctx.font = "55px Arial";
            ctx.textAlign = "center";
            ctx.fillText("😈", player.x, player.y + 18);

            // 武器回転
            for(let i=0; i<player.weapon.count; i++) {
                const a = player.angle + (i * Math.PI * 2 / player.weapon.count);
                const wx = player.x + Math.cos(a) * 110;
                const wy = player.y + Math.sin(a) * 110;
                ctx.save();
                ctx.translate(wx, wy); 
                ctx.rotate(a + Math.PI/2);
                ctx.font = "40px Arial";
                ctx.fillText(player.weapon.emoji, 0, 0);
                ctx.restore();
            }

            // エフェクト文字
            effects.forEach((e, i) => {
                ctx.globalAlpha = e.life; ctx.fillStyle = e.color; ctx.font = "bold 24px Arial";
                ctx.fillText(e.text, e.x, e.y);
                e.y -= 1.0; e.life -= 0.03;
                if(e.life <= 0) effects.splice(i, 1);
            });
            ctx.globalAlpha = 1;

            requestAnimationFrame(loop);
        }

        const move = (e) => {
            const x = e.touches ? e.touches[0].clientX : e.clientX;
            const y = e.touches ? e.touches[0].clientY : e.clientY;
            player.x = x;
            player.y = y;
        };
        window.addEventListener('mousemove', move);
        window.addEventListener('touchmove', move);

        loop();
    </script>
</body>
</html>
