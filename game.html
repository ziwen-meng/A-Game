<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blade Master: All Roads Lead to Store</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #5d9e3f; font-family: 'Arial Black', sans-serif; user-select: none; touch-action: none; }
        canvas { display: block; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; color: white; z-index: 5; }
        #hp-container { position: absolute; top: 40px; left: 20px; font-size: 24px; letter-spacing: 5px; }
        #stage-display { position: absolute; top: 75px; left: 20px; font-size: 18px; color: #ffeb3b; text-shadow: 2px 2px #000; }
        #exp-container { position: absolute; top: 15px; left: 5%; width: 90%; height: 12px; background: rgba(0,0,0,0.3); border-radius: 6px; overflow: hidden; }
        #exp-bar { width: 0%; height: 100%; background: #00f2fe; transition: width 0.1s; }
        #announce { position: absolute; top: 40%; width: 100%; text-align: center; font-size: 50px; font-weight: bold; transform: scale(0); transition: 0.4s cubic-bezier(0.17, 0.89, 0.32, 1.49); text-shadow: 0 0 20px #000; z-index: 10; }
        
        /* 最終リザルト画面 */
        #result-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; flex-direction: column;
            align-items: center; justify-content: center; pointer-events: auto; z-index: 100;
        }

        .result-title {
            font-size: 55px; font-weight: bold; margin-bottom: 10px;
            background: linear-gradient(to right, #ff0000, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff);
            -webkit-background-clip: text; color: transparent;
            animation: rainbow_anim 3s linear infinite, pulse_anim 1s infinite;
            text-shadow: 0 0 20px rgba(255,255,255,0.5);
        }

        .download-btn {
            padding: 22px 50px; background: linear-gradient(#ffeb3b, #ff9800);
            color: #d32f2f; border: 5px solid #fff; border-radius: 50px;
            font-size: 26px; font-weight: bold; cursor: pointer;
            animation: bounce_anim 1.5s infinite;
            box-shadow: 0 10px 25px rgba(255,152,0,0.6);
            margin-top: 30px;
        }

        @keyframes rainbow_anim { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }
        @keyframes pulse_anim { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @keyframes bounce_anim { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(-15px);} }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="exp-container"><div id="exp-bar"></div></div>
        <div id="hp-container">❤️❤️❤️</div>
        <div id="stage-display">STAGE 1 / 5</div>
        <div id="announce">GO!</div>
    </div>

    <div id="result-screen">
        <div id="res-main-text" class="result-title">完全勝利！</div>
        <div id="res-sub-text" style="font-size: 20px; color: #fff;">全ステージ制覇達成！</div>
        <div style="font-size: 30px; color: #ffeb3b; font-weight:bold; margin-top: 20px;">SCORE: 999,999,999</div>
        <button class="download-btn" onclick="window.open('https://example.com', '_blank')">無料でダウンロード</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const expBar = document.getElementById('exp-bar');
        const hpDisplay = document.getElementById('hp-container');
        const stageDisplay = document.getElementById('stage-display');
        const announce = document.getElementById('announce');
        const resultScreen = document.getElementById('result-screen');
        const resMain = document.getElementById('res-main-text');
        const resSub = document.getElementById('res-sub-text');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const WEAPONS = [
            { id: 'banana', emoji: "🍌", power: 100, count: 6, color: "#ffff00" },
            { id: 'spoon', emoji: "🥄", power: 60, count: 4, color: "#ffffff" },
            { id: 'brush', emoji: "🪥", power: 30, count: 8, color: "#00ffff" },
            { id: 'onion', emoji: "🌱", power: 20, count: 5, color: "#aaffaa" }
        ];

        const STAGE_COLORS = ["#5d9e3f", "#3f8e9e", "#8e3f9e", "#9e3f3f", "#1a1a1a"];
        let currentStage = 1;
        const TOTAL_STAGES = 5;

        let player = { x: canvas.width/2, y: canvas.height/2, hp: 3, maxHp: 3, exp: 0, weapon: WEAPONS[3], angle: 0, invul: 0 };
        let enemies = [];
        let bubbles = [];
        let effects = [];
        let confetti = [];
        let gameActive = true;
        let lastDropTime = Date.now();
        let hitStopFrames = 0;
        let screenShake = 0;
        let hitTriggers = new Map();

        class Enemy {
            constructor(isBoss = false, id) { this.id = id; this.isBoss = isBoss; this.reset(); }
            reset() {
                const a = Math.random() * Math.PI * 2;
                this.x = player.x + Math.cos(a) * 500; this.y = player.y + Math.sin(a) * 500;
                this.maxHp = this.isBoss ? 1200 : (30 + currentStage * 15);
                this.hp = this.maxHp;
                this.size = this.isBoss ? 160 : 35;
                this.emoji = this.isBoss ? "🍮" : (currentStage < 4 ? "👾" : "💀");
                this.vx = 0; this.vy = 0; this.flash = 0;
                hitTriggers.set(this.id, new Set());
            }
            update() {
                if(!gameActive) return;
                this.x += this.vx; this.y += this.vy; this.vx *= 0.8; this.vy *= 0.8;
                const dx = player.x - this.x; const dy = player.y - this.y; const d = Math.sqrt(dx*dx + dy*dy);
                const s = this.isBoss ? 0.7 : (1.0 + currentStage * 0.1);
                this.x += (dx/d) * s; this.y += (dy/d) * s;
                if (d < this.size + 10 && player.invul <= 0) takeDamage();

                const activeT = hitTriggers.get(this.id);
                for(let i=0; i<player.weapon.count; i++) {
                    const wa = player.angle + (i * Math.PI * 2 / player.weapon.count);
                    const wx = player.x + Math.cos(wa) * 115; const wy = player.y + Math.sin(wa) * 115;
                    if(Math.sqrt((this.x-wx)**2 + (this.y-wy)**2) < this.size + 30) {
                        if(!activeT.has(i)) {
                            this.hp -= player.weapon.power;
                            effects.push({ x: this.x, y: this.y, text: player.weapon.power, color: player.weapon.color, size: (this.isBoss?45:25), life: 1.2 });
                            activeT.add(i); 
                            if(this.isBoss) { hitStopFrames = 8; screenShake = 20; this.flash = 5; } else { hitStopFrames = 3; }
                            if(this.hp <= 0) { this.die(); return; }
                        }
                    } else { activeT.delete(i); }
                }
            }
            die() {
                if(this.isBoss) { showResult(true); } 
                else { player.exp += 50; updateExp(); }
                this.reset();
            }
            draw() {
                ctx.save();
                if(this.flash > 0) { ctx.filter = "brightness(3)"; this.flash--; }
                ctx.font = `${this.size}px Arial`; ctx.fillText(this.emoji, this.x - this.size/2, this.y + this.size/2);
                ctx.restore();
                ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(this.x - 40, this.y - this.size - 5, 80, 8);
                ctx.fillStyle = this.isBoss ? "#ffeb3b" : "#ff5252"; ctx.fillRect(this.x - 40, this.y - this.size - 5, 80 * (this.hp/this.maxHp), 8);
            }
        }

        function showResult(win) {
            gameActive = false;
            if(!win) {
                resMain.innerText = "作戦失敗！";
                resMain.style.background = "linear-gradient(#fff, #999)";
                resMain.style.webkitBackgroundClip = "text";
                resSub.innerText = "リベンジしてBOSSを倒そう！";
            }
            resultScreen.style.display = "flex";
            for(let i=0; i<100; i++) confetti.push({ x: Math.random()*canvas.width, y: -20, size: Math.random()*10+5, color: `hsl(${Math.random()*360}, 100%, 70%)`, vy: Math.random()*5+2, vx: (Math.random()-0.5)*3, angle: Math.random()*360, vAngle: Math.random()*10-5 });
        }

        function takeDamage() {
            player.hp--; player.invul = 60;
            hpDisplay.innerText = "❤️".repeat(Math.max(0, player.hp));
            screenShake = 15;
            if(player.hp <= 0) { showResult(false); }
        }

        function updateExp() { expBar.style.width = player.exp + "%"; if(player.exp >= 100) { player.exp = 0; nextStage(); } }

        function nextStage() {
            if(currentStage < TOTAL_STAGES) {
                currentStage++; stageDisplay.innerText = `STAGE ${currentStage} / 5`;
                announce.innerText = currentStage === 5 ? "FINAL BOSS!" : `STAGE ${currentStage}`;
                announce.style.transform = "scale(1)"; setTimeout(() => announce.style.transform = "scale(0)", 1500);
                if(currentStage === 5) { enemies = [new Enemy(true, 0)]; }
                else { enemies.forEach(e => e.reset()); }
            }
        }

        for(let i=0; i<4; i++) enemies.push(new Enemy(false, i));

        function loop() {
            if(!gameActive) {
                ctx.fillStyle = "#1a1a1a"; ctx.fillRect(0,0, canvas.width, canvas.height);
                confetti.forEach((c, i) => {
                    ctx.fillStyle = c.color; ctx.save(); ctx.translate(c.x, c.y); ctx.rotate(c.angle * Math.PI / 180);
                    ctx.fillRect(-c.size/2, -c.size/2, c.size, c.size); ctx.restore();
                    c.y += c.vy; c.x += c.vx; c.angle += c.vAngle; if(c.y > canvas.height + 20) confetti.splice(i, 1);
                });
                requestAnimationFrame(loop); return;
            }
            if (hitStopFrames > 0) { hitStopFrames--; requestAnimationFrame(loop); return; }
            ctx.save();
            if (screenShake > 0) { ctx.translate((Math.random()-0.5)*screenShake, (Math.random()-0.5)*screenShake); screenShake *= 0.9; }
            ctx.fillStyle = STAGE_COLORS[currentStage-1]; ctx.fillRect(-100, -100, canvas.width+200, canvas.height+200);
            if(player.invul > 0) player.invul--;

            if(Date.now() - lastDropTime > 3000 && bubbles.length === 0) {
                bubbles.push({ x: Math.random()*(canvas.width-100)+50, y: Math.random()*(canvas.height-100)+50, weapon: WEAPONS[Math.floor(Math.random()*(WEAPONS.length-1))], t: 0 });
                lastDropTime = Date.now();
            }
            bubbles.forEach((b, i) => {
                b.t += 0.03; ctx.beginPath(); ctx.arc(b.x, b.y, 45+Math.sin(b.t)*5, 0, Math.PI*2);
                ctx.fillStyle = "rgba(255,255,255,0.4)"; ctx.fill(); ctx.font = "35px Arial"; ctx.fillText(b.weapon.emoji, b.x-15, b.y+10);
                if(Math.sqrt((player.x-b.x)**2 + (player.y-b.y)**2) < 65) { player.weapon = b.weapon; announce.innerText = "装備UP!"; announce.style.transform="scale(1)"; setTimeout(()=>announce.style.transform="scale(0)",1000); bubbles.splice(i, 1); }
            });
            player.angle += 0.025; enemies.forEach(e => { e.update(); e.draw(); });
            ctx.globalAlpha = (player.invul % 10 > 5) ? 0.4 : 1; ctx.font = "55px Arial"; ctx.fillText("😈", player.x-28, player.y+22);
            ctx.globalAlpha = 1; ctx.fillStyle = "#4ade80"; ctx.fillRect(player.x - 30, player.y - 60, 60 * (player.hp / player.maxHp), 8);
            for(let i=0; i<player.weapon.count; i++) {
                const a = player.angle + (i * Math.PI * 2 / player.weapon.count);
                const wx = player.x + Math.cos(a) * 115; const wy = player.y + Math.sin(a) * 115;
                ctx.save(); ctx.translate(wx, wy); ctx.rotate(a + Math.PI/2); ctx.font = "42px Arial"; ctx.fillText(player.weapon.emoji, -20, 20); ctx.restore();
            }
            effects.forEach((e, i) => { ctx.globalAlpha = e.life; ctx.fillStyle = e.color; ctx.font = `bold ${e.size}px Arial`; ctx.fillText(e.text, e.x, e.y); e.y -= 1.0; e.life -= 0.02; if(e.life <= 0) effects.splice(i, 1); });
            ctx.restore(); requestAnimationFrame(loop);
        }
        window.addEventListener('mousemove', (e) => { if(gameActive){player.x = e.clientX; player.y = e.clientY;} });
        window.addEventListener('touchmove', (e) => { if(gameActive){player.x = e.touches[0].clientX; player.y = e.touches[0].clientY;} });
        loop();
    </script>
</body>
</html>
