<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blade Master - Playable Ad</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #7ab356; /* 草原の色 */
            font-family: 'Arial Black', sans-serif;
            user-select: none;
            touch-action: none;
        }
        canvas {
            display: block;
        }
        #ui-overlay {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            pointer-events: none;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .cta-button {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 40px;
            background: linear-gradient(to bottom, #ffcc00, #ff9900);
            border: 4px solid #fff;
            border-radius: 50px;
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            display: none;
            cursor: pointer;
            animation: pulse 1s infinite;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        @keyframes pulse {
            0% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.1); }
            100% { transform: translateX(-50%) scale(1); }
        }
        #tutorial {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 20px;
            text-align: center;
            background: rgba(0,0,0,0.4);
            padding: 10px 20px;
            border-radius: 20px;
        }
    </style>
</head>
<body>

    <div id="ui-overlay">
        <h1 id="score-display">⚔️ ENEMY: 20</h1>
    </div>

    <div id="tutorial">👆 Drag to Move & Slash!</div>

    <button id="cta" class="cta-button" onclick="location.reload()">DOWNLOAD NOW</button>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const ctaBtn = document.getElementById('cta');
        const scoreDisplay = document.getElementById('score-display');
        const tutorial = document.getElementById('tutorial');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let gameActive = true;
        let score = 20;
        let particles = [];
        let damageTexts = [];
        let shakeTime = 0;

        // Player object
        const player = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: 25,
            targetX: canvas.width / 2,
            targetY: canvas.height / 2,
            swordAngle: 0,
            swords: 12 // 円状の剣の数
        };

        // Enemy class
        class Enemy {
            constructor() {
                this.reset();
            }
            reset() {
                const side = Math.floor(Math.random() * 4);
                if(side === 0) { this.x = Math.random() * canvas.width; this.y = -50; }
                else if(side === 1) { this.x = canvas.width + 50; this.y = Math.random() * canvas.height; }
                else if(side === 2) { this.x = Math.random() * canvas.width; this.y = canvas.height + 50; }
                else { this.x = -50; this.y = Math.random() * canvas.height; }
                
                this.hp = 100;
                this.speed = 1.5 + Math.random();
                this.size = 20;
                this.isDead = false;
                this.emoji = ['👾', '👹', '👻', '🧟'][Math.floor(Math.random() * 4)];
            }
            update() {
                const dx = player.x - this.x;
                const dy = player.y - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                this.x += (dx / dist) * this.speed;
                this.y += (dy / dist) * this.speed;

                // Collision with swords
                const swordDist = 80; // 剣の回転半径
                if (dist < swordDist + 20) {
                    this.takeDamage();
                }
            }
            takeDamage() {
                this.hp -= 5;
                if(this.hp <= 0 && !this.isDead) {
                    this.isDead = true;
                    createExplosion(this.x, this.y);
                    score--;
                    shakeTime = 10;
                    if(score <= 0) winGame();
                }
                damageTexts.push({x: this.x, y: this.y, val: 20, life: 30});
            }
            draw() {
                ctx.font = '30px serif';
                ctx.fillText(this.emoji, this.x - 15, this.y + 10);
                // HP Bar
                ctx.fillStyle = 'red';
                ctx.fillRect(this.x - 15, this.y - 25, 30, 4);
                ctx.fillStyle = '#00ff00';
                ctx.fillRect(this.x - 15, this.y - 25, (this.hp/100) * 30, 4);
            }
        }

        const enemies = Array.from({length: 20}, () => new Enemy());

        function createExplosion(x, y) {
            for(let i=0; i<10; i++) {
                particles.push({
                    x, y, 
                    vx: (Math.random()-0.5)*10, 
                    vy: (Math.random()-0.5)*10, 
                    life: 1, 
                    color: '#fff'
                });
            }
        }

        function update() {
            if(!gameActive) return;

            // Player movement
            player.x += (player.targetX - player.x) * 0.1;
            player.y += (player.targetY - player.y) * 0.1;
            player.swordAngle += 0.15;

            enemies.forEach(en => {
                if(!en.isDead) en.update();
            });

            // Particles & Damage Text
            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; p.life -= 0.05;
                if(p.life <= 0) particles.splice(i, 1);
            });
            damageTexts.forEach((t, i) => {
                t.y -= 1; t.life--;
                if(t.life <= 0) damageTexts.splice(i, 1);
            });

            scoreDisplay.innerText = `⚔️ ENEMIES LEFT: ${Math.max(0, score)}`;
        }

        function draw() {
            // Shake effect
            ctx.save();
            if(shakeTime > 0) {
                ctx.translate(Math.random()*5-2.5, Math.random()*5-2.5);
                shakeTime--;
            }

            // Background
            ctx.fillStyle = '#7ab356';
            ctx.fillRect(0,0, canvas.width, canvas.height);
            
            // Draw Enemies
            enemies.forEach(en => { if(!en.isDead) en.draw(); });

            // Draw Player (The Purple Knight)
            ctx.font = '50px serif';
            ctx.fillText('😈', player.x - 25, player.y + 15);
            
            // Draw Swords (Circular Aura)
            for(let i=0; i < player.swords; i++) {
                const angle = player.swordAngle + (i * Math.PI * 2 / player.swords);
                const sx = player.x + Math.cos(angle) * 80;
                const sy = player.y + Math.sin(angle) * 80;
                
                ctx.save();
                ctx.translate(sx, sy);
                ctx.rotate(angle + Math.PI/2);
                // 剣の描画
                ctx.fillStyle = '#e0e0e0'; // 刃
                ctx.fillRect(-4, -25, 8, 35);
                ctx.fillStyle = '#ffd700'; // 柄
                ctx.fillRect(-8, 5, 16, 4);
                ctx.fillRect(-2, 5, 4, 10);
                ctx.restore();
            }

            // Damage Numbers
            ctx.font = 'bold 20px Arial';
            damageTexts.forEach(t => {
                ctx.fillStyle = `rgba(255, 255, 255, ${t.life/30})`;
                ctx.fillText(t.val, t.x, t.y);
            });

            // Particles
            particles.forEach(p => {
                ctx.fillStyle = `rgba(255, 255, 0, ${p.life})`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 3, 0, Math.PI*2);
                ctx.fill();
            });

            ctx.restore();
            requestAnimationFrame(() => { update(); draw(); });
        }

        function winGame() {
            gameActive = false;
            tutorial.style.display = 'none';
            scoreDisplay.innerHTML = "✨ LEVEL COMPLETE! ✨";
            ctaBtn.style.display = 'block';
        }

        // Input Handling
        const handleMove = (e) => {
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            player.targetX = clientX;
            player.targetY = clientY;
            tutorial.style.opacity = 0;
        };

        window.addEventListener('mousemove', handleMove);
        window.addEventListener('touchmove', handleMove);
        window.addEventListener('mousedown', handleMove);

        // Start
        draw();
    </script>
</body>
</html>
