<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blade Master: Auto Progression</title>
    <style>
        body {
            margin: 0; padding: 0; overflow: hidden;
            background-color: #5d9e3f;
            font-family: 'Arial Black', sans-serif;
            user-select: none; touch-action: none;
        }
        canvas { display: block; }

        /* UI Elements */
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; color: white;
        }
        
        /* 経験値ゲージ（上部固定） */
        #exp-container {
            position: absolute; top: 10px; left: 5%; width: 90%; height: 12px;
            background: rgba(0,0,0,0.3); border-radius: 6px; overflow: hidden;
        }
        #exp-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #00f2fe, #4facfe); transition: width 0.2s; }

        /* ステージ表示 */
        #stage-info {
            position: absolute; top: 30px; left: 0; width: 100%; text-align: center;
            font-size: 18px; letter-spacing: 2px; text-shadow: 2px 2px #000;
        }

        /* 画面中央のアナウンス */
        #announce {
            position: absolute; top: 40%; width: 100%; text-align: center;
            font-size: 48px; font-weight: bold; transform: scale(0);
            transition: transform 0.4s cubic-bezier(0.17, 0.89, 0.32, 1.49);
            text-shadow: 0 0 20px rgba(255,255,255,0.8);
        }

        /* 邪魔にならないCTAボタン（下部固定） */
        .download-footer {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 80%; max-width: 300px; height: 50px;
            background: linear-gradient(#ff9800, #f44336);
            border-radius: 25px; border: 3px solid #fff;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; pointer-events: auto; cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            animation: bounce 2s infinite;
        }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translateX(-50%) translateY(0);} 40% {transform: translateX(-50%) translateY(-10px);} 60% {transform: translateX(-50%) translateY(-5px);} }

        /* 画面フラッシュ用 */
        #flash {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: white; opacity: 0; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="exp-container"><div id="exp-bar"></div></div>
        <div id="stage-info">STAGE 1: GRASSLAND</div>
        <div id="announce">LEVEL UP!</div>
        <div class="download-footer" onclick="window.open('https://example.com', '_blank')">🚀 INSTALL FREE</div>
    </div>
    <div id="flash"></div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const expBar = document.getElementById('exp-bar');
        const announce = document.getElementById('announce');
        const stageText = document.getElementById('stage-info');
        const flash = document.getElementById('flash');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // 武器データ
        const WEAPONS = [
            { name: "バナナ", emoji: "🍌", color: "#ffff00", power: 100, effect: "slip" },
            { name: "しゃもじ", emoji: "🥄", color: "#fff", power: 40, effect: "push" },
            { name: "歯ブラシ", emoji: "🪥", color: "#0ff", power: 20, effect: "bubble" },
            { name: "ネギ", emoji: "🌱", color: "#aff", power: 15, effect: "none" }
        ];

        // ゲーム状態
        let player = { x: canvas.width/2, y: canvas.height/2, exp: 0, level: 1, weapon: WEAPONS[3], swordCount: 4, angle: 0 };
        let stage = 1;
        let enemies = [];
        let bubbles = [];
        let effects = [];
        let lastDropTime = Date.now();
        let bgColor = "#5d9e3f";

        class Enemy {
            constructor() { this.reset(); }
            reset() {
                const angle = Math.random() * Math.PI * 2;
                this.x = player.x + Math.cos(angle) * (canvas.width/2 + 100);
                this.y = player.y + Math.sin(angle) * (canvas.height/2 + 100);
                this.hp = 50 + (stage * 20);
                this.isSlipped = false;
                this.vx = 0; this.vy = 0;
                this.emoji = stage === 1 ? '👾' : stage === 2 ? '💀' : '🐉';
            }
            update() {
                if (this.isSlipped) {
                    this.x += this.vx; this.y += this.vy;
                    if (this.x < -200 || this.x > canvas.width + 200 || this.y < -200 || this.y > canvas.height + 200) this.reset();
                    return;
                }
                const dx = player.x - this.x;
                const dy = player.y - this.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                this.x += (dx/dist) * (1.5 + stage * 0.5);
                this.y += (dy/dist) * (1.5 + stage * 0.5);

                for(let i=0; i<player.swordCount; i++) {
                    const wAngle = player.angle + (i * Math.PI * 2 / player.swordCount);
                    const wx = player.x + Math.cos(wAngle) * 90;
                    const wy = player.y + Math.sin(wAngle) * 90;
                    if(Math.sqrt((this.x-wx)**2 + (this.y-wy)**2) < 40) this.hit();
                }
            }
            hit() {
                if (player.weapon.effect === "slip") {
                    this.isSlipped = true;
                    this.vx = (this.x - player.x) * 0.25;
                    this.vy = (this.y - player.y) * 0.25;
                    addEffect(this.x, this.y, "ズコーッ！", "#ff0");
                } else {
                    player.exp += 5;
                    addEffect(this.x, this.y, "+EXP", "#0ff");
                    this.reset();
                    checkLevelUp();
                }
            }
        }

        function addEffect(x, y, text, color) { effects.push({ x, y, text, color, life: 1.0 }); }

        function checkLevelUp() {
            if (player.exp >= 100) {
                player.exp = 0;
                player.level++;
                player.swordCount++;
                showAnnounce("LEVEL UP! ⚔️+1");
                if (player.level % 3 === 0) nextStage();
            }
            expBar.style.width = player.exp + "%";
        }

        function nextStage() {
            stage++;
            flash.style.opacity = 1;
            setTimeout(() => { flash.style.opacity = 0; }, 300);
            bgColor = stage === 2 ? "#4a4a4a" : "#7b1fa2";
            stageText.innerText = `STAGE ${stage}: ${stage === 2 ? 'DARK DUNGEON' : 'HELL GATE'}`;
            showAnnounce("NEXT STAGE!");
            enemies.forEach(e => e.reset());
        }

        function showAnnounce(txt) {
            announce.innerText = txt;
            announce.style.transform = "scale(1)";
            setTimeout(() => { announce.style.transform = "scale(0)"; }, 1500);
        }

        function spawnBubble() {
            const w = WEAPONS[Math.floor(Math.random() * WEAPONS.length)];
            bubbles.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, weapon: w, t: 0 });
        }

        // Init
        for(let i=0; i<12; i++) enemies.push(new Enemy());

        function loop() {
            ctx.fillStyle = bgColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // バブル処理
            if(Date.now() - lastDropTime > 10000) { spawnBubble(); lastDropTime = Date.now(); }
            bubbles.forEach((b, i) => {
                b.t += 0.05;
                const pulse = Math.sin(b.t) * 5;
                ctx.beginPath();
                ctx.arc(b.x, b.y, 40+pulse, 0, Math.PI*2);
                ctx.fillStyle = "rgba(255,255,255,0.2)"; ctx.fill();
                ctx.strokeStyle = "#fff"; ctx.stroke();
                ctx.font = "30px Arial"; ctx.fillText(b.weapon.emoji, b.x-15, b.y+10);
                if(Math.sqrt((player.x-b.x)**2 + (player.y-b.y)**2) < 60) {
                    player.weapon = b.weapon;
                    showAnnounce(b.weapon.name + " GET!");
                    bubbles.splice(i, 1);
                }
            });

            // 敵・プレイヤー
            player.angle += 0.15;
            enemies.forEach(e => { e.update(); e.draw(); });
            
            ctx.font = "50px Arial";
            ctx.fillText("😈", player.x-25, player.y+20);

            // 武器回転
            for(let i=0; i<player.swordCount; i++) {
                const a = player.angle + (i * Math.PI * 2 / player.swordCount);
                const wx = player.x + Math.cos(a) * 95;
                const wy = player.y + Math.sin(a) * 95;
                ctx.save();
                ctx.translate(wx, wy); ctx.rotate(a + Math.PI/2);
                ctx.font = "35px Arial"; ctx.fillText(player.weapon.emoji, -17, 17);
                ctx.restore();
            }

            // エフェクト
            effects.forEach((e, i) => {
                ctx.globalAlpha = e.life;
                ctx.fillStyle = e.color;
                ctx.font = "bold 20px Arial";
                ctx.fillText(e.text, e.x, e.y);
                e.y -= 1.5; e.life -= 0.03;
                if(e.life <= 0) effects.splice(i, 1);
            });
            ctx.globalAlpha = 1;

            requestAnimationFrame(loop);
        }

        Enemy.prototype.draw = function() {
            ctx.font = "30px Arial";
            ctx.fillText(this.emoji, this.x-15, this.y+10);
        };

        // 入力
        const move = (e) => {
            player.x = e.touches ? e.touches[0].clientX : e.clientX;
            player.y = e.touches ? e.touches[0].clientY : e.clientY;
        };
        window.addEventListener('mousemove', move);
        window.addEventListener('touchmove', move);

        loop();
    </script>
</body>
</html>
