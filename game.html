<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>三国ドライブ - 鳳凰三連撃</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #1a0000; font-family: 'Hiragino Mincho ProN', 'MS PMincho', serif; user-select: none; touch-action: none; }
        canvas { display: block; }
        
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }
        
        #exp-container { position: absolute; top: 15px; left: 5%; width: 90%; height: 10px; background: rgba(0,0,0,0.6); border: 1px solid #d4af37; border-radius: 2px; overflow: hidden; box-shadow: 0 0 15px #8e0000; }
        #exp-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #d4af37, #fff700, #d4af37); transition: width 0.3s; }

        #stage-display { position: absolute; top: 35px; left: 5%; font-size: 18px; color: #ffd700; text-shadow: 2px 2px #000; letter-spacing: 2px; font-weight: bold; }
        #weapon-count-display { position: absolute; top: 35px; right: 5%; font-size: 18px; color: #fff; text-shadow: 2px 2px #000; font-weight: bold; }

        #start-screen, #result-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; color: #ffd700; text-align: center; }
        
        #start-screen { background: radial-gradient(circle, #3d0000 0%, #000000 100%); }
        #result-screen { background-size: cover; background-position: center; }

        .title-text { font-size: 70px; margin-bottom: 15px; background: linear-gradient(to bottom, #fff700, #d4af37, #8a6d3b); -webkit-background-clip: text; color: transparent; filter: drop-shadow(0 0 10px rgba(212,175,55,0.5)); font-weight: 900; }
        
        #win-img-container img { max-width: 80%; height: auto; margin-bottom: 30px; filter: drop-shadow(0 0 20px rgba(212,175,55,0.8)); }

        .btn { padding: 18px 60px; background: #600000; color: #ffd700; border: 2px solid #d4af37; font-size: 24px; cursor: pointer; transition: 0.3s; box-shadow: 0 5px 15px rgba(0,0,0,0.5); font-family: serif; z-index: 101; pointer-events: auto; }
        .btn:hover { background: #d4af37; color: #3d0000; }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1 class="title-text">三国ドライブ</h1>
        <p style="color: #d4af37; font-size: 18px;">敵軍を殲滅せよ。全滅させねば次へは進めぬ。</p>
        <button class="btn" onclick="startGame()">合戦開始</button>
    </div>

    <div id="ui-layer">
        <div id="exp-container"><div id="exp-bar"></div></div>
        <div id="stage-display">第一幕</div>
        <div id="weapon-count-display">武器数: 3</div>
    </div>

    <div id="result-screen" style="display:none;">
        <div id="res-content-area">
            <div id="res-main-text" class="title-text"></div>
            <div id="win-img-container"></div>
        </div>
        <button class="btn" onclick="location.reload()">再戦を望む</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const expBar = document.getElementById('exp-bar');
        const stageDisplay = document.getElementById('stage-display');
        const weaponCountDisplay = document.getElementById('weapon-count-display');
        const startScreen = document.getElementById('start-screen');
        const resultScreen = document.getElementById('result-screen');
        const resMainText = document.getElementById('res-main-text');
        const winImgContainer = document.getElementById('win-img-container');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- Resources ---
        const playerImg = new Image(); playerImg.src = 'player.png';
        const enemySprite = new Image(); enemySprite.src = 'enemy.png';
        const bossSprite = new Image(); bossSprite.src = 'boss.png';
        const gatchaBubbleImg = new Image(); gatchaBubbleImg.src = 'gatcha.png';

        const bgImages = [];
        for(let i=1; i<=5; i++) {
            const img = new Image(); img.src = `background${i}.png`;
            bgImages.push(img);
        }
        const weaponImages = [];
        for(let i=1; i<=5; i++) {
            const img = new Image(); img.src = `weapon${i}.png`;
            weaponImages.push(img);
        }
        const gatchaImages = [];
        for(let i=1; i<=3; i++) {
            const img = new Image(); img.src = `gatcha${i}.png`;
            gatchaImages.push(img);
        }

        // BGM設定
        const bossBgm = new Audio('boss_bgm.wav');
        bossBgm.loop = true;
        bossBgm.volume = 0.5;

        const SPRITE_COLS = 3, SPRITE_ROWS = 3, INNER_PAD = 10;
        let pW = 0, pH = 0, eW = 0, eH = 0, bW = 0, bH = 0;
        
        playerImg.onload = () => { pW = playerImg.width / SPRITE_COLS; pH = playerImg.height / SPRITE_ROWS; };
        enemySprite.onload = () => { eW = enemySprite.width / SPRITE_COLS; eH = enemySprite.height / SPRITE_ROWS; };
        bossSprite.onload = () => { bW = bossSprite.width / SPRITE_COLS; bH = bossSprite.height / SPRITE_ROWS; };

        const WEAPONS = [
            { id: 'weapon1', imgIdx: 0, power: 30,  gatchaIdx: 0 },
            { id: 'weapon2', imgIdx: 1, power: 50,  gatchaIdx: 0 },
            { id: 'weapon3', imgIdx: 2, power: 75,  gatchaIdx: 1 },
            { id: 'weapon4', imgIdx: 3, power: 100, gatchaIdx: 1 },
            { id: 'weapon5', imgIdx: 4, power: 150, gatchaIdx: 2 }
        ];

        let currentStage = 1;
        const STAGE_NAMES = ["第一幕", "第二幕", "第三幕", "第四幕", "終幕：呂布との死闘"];
        const STAGE_SPAWN_TIMES = [10, 10, 20, 30, 30]; 
        
        let player = { 
            x: 0, 
            y: 0, 
            targetX: 0, 
            targetY: 0, 
            speed: 3, 
            hp: 12, 
            maxHp: 12, 
            weapon: WEAPONS[0], 
            angle: 0, 
            invul: 0, 
            size: 90, 
            animFrame: 0, 
            dir: 1 
        };

        let enemies = [], bubbles = [], effects = [], confetti = [];
        let gameActive = false, frameCount = 0, lastHealTime = Date.now();
        let hitStopFrames = 0, screenShake = 0;
        let hitTriggers = new Map();
        let enemyIdCounter = 0;

        let stageData = { totalEnemies: 0, killedEnemies: 0, spawnedCount: 0, droppedWeapon: false, stageFrame: 0, spawnInterval: 60, bossSpawned: false };
        let trans = { active: false, chars: [], x: 0, targetX: 0, state: 'in', timer: 0 };
        let pickupDisplay = { active: false, imgIdx: 0, gatchaIdx: 0, timer: 0, maxTimer: 180 };

        const WEAPON_RADIUS = 100; 
        const WEAPON_SIZE = 80;
        let weaponTrails = Array(6).fill().map(() => []); 
        const TRAIL_MAX_LENGTH = 16; 

        function getWeaponCount() {
            if (currentStage === 1) return 3;
            if (currentStage === 2) return 4;
            if (currentStage === 3) return 5;
            return 6;
        }

        function playHitSound() {
            const audio = new Audio('blade_whoosh.wav');
            audio.volume = 0.2; 
            audio.play().catch(e => {}); 
        }

        function playGatchaSound(weaponId) {
            let soundFile = '';
            if (weaponId === 'weapon2' || weaponId === 'weapon3') {
                soundFile = 'gatcha23.wav';
            } else if (weaponId === 'weapon4') {
                soundFile = 'gatcha4.wav';
            } else if (weaponId === 'weapon5') {
                soundFile = 'gatcha5.wav';
            }

            if (soundFile) {
                const audio = new Audio(soundFile);
                audio.volume = 0.4;
                audio.play().catch(e => {});
            }
        }

        class Enemy {
            constructor(isBoss = false) {
                this.id = enemyIdCounter++; 
                this.isBoss = isBoss; 
                this.animFrame = Math.floor(Math.random() * 8);
                this.spawn();
            }
            spawn() {
                const angle = Math.random() * Math.PI * 2;
                const d = 600 + Math.random() * 300;
                this.x = player.x + Math.cos(angle) * d;
                this.y = player.y + Math.sin(angle) * d;
                this.maxHp = this.isBoss ? 12000 : 40 + (currentStage * 30);
                this.hp = this.maxHp;
                this.size = this.isBoss ? 260 : 85;
                this.flash = 0;
                hitTriggers.set(this.id, new Set());
            }
            update() {
                if(!gameActive || pickupDisplay.active) return;
                const dx = player.x - this.x, dy = player.y - this.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                const speed = this.isBoss ? 1.1 : 1.3 + (currentStage * 0.2);
                this.x += (dx/dist) * speed;
                this.y += (dy/dist) * speed;
                this.dir = dx > 0 ? 1 : -1;

                if(dist < this.size*0.35 && player.invul <= 0) takeDamage();

                const activeT = hitTriggers.get(this.id);
                const count = getWeaponCount();
                for(let i=0; i < count; i++) {
                    const wa = player.angle + (i * Math.PI * 2 / count);
                    const wx = player.x + Math.cos(wa) * WEAPON_RADIUS; 
                    const wy = player.y + Math.sin(wa) * WEAPON_RADIUS;
                    
                    if(Math.sqrt((this.x-wx)**2 + (this.y-wy)**2) < this.size*0.4 + 40) {
                        if(!activeT.has(i)) {
                            this.hp -= player.weapon.power;
                            this.flash = 5;
                            effects.push({ x: this.x, y: this.y, text: player.weapon.power, color: "#ffd700", life: 1.0 });
                            playHitSound();
                            activeT.add(i);
                            if(this.isBoss) { hitStopFrames = 5; screenShake = 15; } else { hitStopFrames = 2; }
                            if(this.hp <= 0) this.die();
                        }
                    } else { activeT.delete(i); }
                }
            }
            draw() {
                const sprite = this.isBoss ? bossSprite : enemySprite;
                const fW = this.isBoss ? bW : eW;
                const fH = this.isBoss ? bH : eH;
                if (!fW) return; 
                if (!pickupDisplay.active && frameCount % 7 === 0) this.animFrame = (this.animFrame + 1) % 8;
                const sx = (this.animFrame % SPRITE_COLS) * fW + INNER_PAD;
                const sy = Math.floor(this.animFrame / SPRITE_COLS) * fH + INNER_PAD;
                ctx.save();
                ctx.translate(this.x, this.y);
                if(this.dir === -1) ctx.scale(-1, 1);
                if(this.flash > 0) { ctx.filter = "brightness(2) sepia(1)"; this.flash--; }
                ctx.drawImage(sprite, sx, sy, fW-20, fH-20, -this.size/2, -this.size/2, this.size, this.size);
                ctx.restore();
                ctx.fillStyle = "rgba(0,0,0,0.7)"; 
                ctx.fillRect(this.x - 40, this.y - this.size/2 - 15, 80, 7);
                ctx.fillStyle = this.isBoss ? "#ffff00" : "#d4af37"; 
                ctx.fillRect(this.x - 40, this.y - this.size/2 - 15, 80 * (this.hp/this.maxHp), 7);
            }
            die() {
                const idx = enemies.indexOf(this);
                if (idx > -1) enemies.splice(idx, 1);
                hitTriggers.delete(this.id);
                stageData.killedEnemies++;
                updateProgressBar();

                if (currentStage > 1 && !stageData.droppedWeapon) {
                    if (stageData.killedEnemies >= stageData.totalEnemies / 2) {
                        dropWeapon(currentStage);
                        stageData.droppedWeapon = true;
                    }
                }
            }
        }

        function startGame() {
            startScreen.style.display = 'none';
            player.x = canvas.width/2; 
            player.y = canvas.height/2;
            player.targetX = player.x;
            player.targetY = player.y;
            
            player.weapon = WEAPONS[0];
            gameActive = true;
            currentStage = 1;
            startStageWave();
            loop();
        }

        function startStageWave() {
            enemies = [];
            stageData.droppedWeapon = false;
            stageData.killedEnemies = 0;
            stageData.spawnedCount = 0;
            stageData.stageFrame = 0;
            stageData.bossSpawned = false;
            weaponTrails = Array(6).fill().map(() => []);

            // ラストステージ（第5幕）ならBGMをループ再生開始
            if (currentStage === 5) {
                bossBgm.play().catch(e => console.log("BGM Play Error:", e));
            }

            let numSmall = [0, 12, 20, 40, 60, 80][currentStage];
            stageData.totalSmallToSpawn = numSmall;
            stageData.totalEnemies = numSmall + (currentStage === 5 ? 1 : 0);
            
            let framesToSpawn = STAGE_SPAWN_TIMES[currentStage - 1] * 60;
            stageData.spawnInterval = Math.max(1, Math.floor(framesToSpawn / numSmall));

            weaponCountDisplay.innerText = "武器数: " + getWeaponCount();
            updateProgressBar();
        }

        function updateProgressBar() {
            const progress = (stageData.killedEnemies / stageData.totalEnemies) * 100;
            expBar.style.width = progress + "%";
        }

        function dropWeapon(stage) {
            const targetWeapon = WEAPONS[stage - 1];
            if(!targetWeapon) return;
            bubbles.push({ x: Math.random() * (canvas.width - 200) + 100, y: Math.random() * (canvas.height - 200) + 100, content: targetWeapon, type: 'weapon', t: 0 });
        }

        function takeDamage() {
            player.hp--; player.invul = 65;
            screenShake = 18;
            if(player.hp <= 0) endGame(false);
        }

        function nextStage() {
            currentStage++;
            stageDisplay.innerText = STAGE_NAMES[currentStage-1];
            trans.chars = `【 ${STAGE_NAMES[currentStage-1]} 】 いざ参らん`.split('');
            trans.x = canvas.width + 100;
            trans.targetX = canvas.width / 2 - (trans.chars.length * 30);
            trans.state = 'in'; trans.timer = 110; trans.active = true;
            setTimeout(() => { if (gameActive) startStageWave(); }, 1000);
        }

        function loop() {
            if(!gameActive) {
                ctx.fillStyle = "#111"; ctx.fillRect(0,0, canvas.width, canvas.height);
                confetti.forEach((c, i) => {
                    ctx.fillStyle = c.color; ctx.save(); ctx.translate(c.x, c.y); ctx.rotate(c.angle * Math.PI / 180);
                    ctx.fillRect(-c.size/2, -c.size/2, c.size, c.size); ctx.restore();
                    c.y += c.vy; c.x += c.vx; c.angle += c.vAngle; if(c.y > canvas.height + 20) confetti.splice(i, 1);
                });
                requestAnimationFrame(loop); return;
            }

            if (hitStopFrames > 0 && !pickupDisplay.active) { hitStopFrames--; requestAnimationFrame(loop); return; }
            
            if(!pickupDisplay.active) {
                frameCount++;

                let dx = player.targetX - player.x;
                let dy = player.targetY - player.y;
                let distance = Math.sqrt(dx * dx + dy * dy);

                if (distance > 1) {
                    let moveX = (dx / distance) * player.speed;
                    let moveY = (dy / distance) * player.speed;
                    if (Math.abs(moveX) > Math.abs(dx)) moveX = dx;
                    if (Math.abs(moveY) > Math.abs(dy)) moveY = dy;
                    player.x += moveX;
                    player.y += moveY;
                    player.dir = dx > 0 ? 1 : -1;
                }

                if(!trans.active) {
                    stageData.stageFrame++;
                    if (stageData.spawnedCount < stageData.totalSmallToSpawn) {
                        if (stageData.stageFrame % stageData.spawnInterval === 0) {
                            enemies.push(new Enemy(false));
                            stageData.spawnedCount++;
                        }
                    }
                    if (currentStage === 5 && !stageData.bossSpawned) {
                        enemies.push(new Enemy(true));
                        stageData.bossSpawned = true;
                    }
                }

                if (!trans.active && stageData.spawnedCount >= stageData.totalSmallToSpawn && enemies.length === 0) {
                    if (currentStage === 5 && stageData.bossSpawned) endGame(true);
                    else if (currentStage < 5) nextStage();
                }
            }
            
            ctx.save();
            if (screenShake > 0 && !pickupDisplay.active) { ctx.translate((Math.random()-0.5)*screenShake, (Math.random()-0.5)*screenShake); screenShake *= 0.9; }
            
            const curBG = bgImages[currentStage-1];
            if(curBG && curBG.complete) {
                ctx.drawImage(curBG, 0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "rgba(0,0,0,0.45)"; ctx.fillRect(0,0,canvas.width,canvas.height);
            } else {
                ctx.fillStyle = "#1a0000"; ctx.fillRect(0,0,canvas.width,canvas.height);
            }

            const now = Date.now();
            if(!pickupDisplay.active && now - lastHealTime > 15000 && player.hp < player.maxHp) {
                bubbles.push({ x: Math.random()*(canvas.width-200)+100, y: Math.random()*(canvas.height-200)+100, type: 'heal', t: 0 });
                lastHealTime = now;
            }

            bubbles.forEach((b, i) => {
                if(!pickupDisplay.active) b.t += 0.03; 
                const bobbing = Math.sin(b.t) * 5;
                if (b.type === 'weapon') {
                    ctx.save();
                    const grad = ctx.createRadialGradient(b.x, b.y + bobbing, 0, b.x, b.y + bobbing, 70);
                    grad.addColorStop(0, "rgba(255, 215, 0, 0.7)"); grad.addColorStop(1, "rgba(255, 215, 0, 0)");
                    ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(b.x, b.y + bobbing, 70, 0, Math.PI * 2); ctx.fill();
                    ctx.restore();
                    if (gatchaBubbleImg.complete) ctx.drawImage(gatchaBubbleImg, b.x - 45, b.y - 67.5 + bobbing, 90, 135);
                    const wImg = weaponImages[b.content.imgIdx];
                    if (wImg && wImg.complete) ctx.drawImage(wImg, b.x - 30, b.y - 30 + bobbing, 60, 60);
                } else {
                    ctx.beginPath(); ctx.arc(b.x, b.y, 45 + bobbing, 0, Math.PI*2);
                    ctx.fillStyle = "rgba(255,100,100,0.4)"; ctx.fill(); 
                    ctx.strokeStyle = "#ff0000"; ctx.lineWidth = 2; ctx.stroke();
                    ctx.font = "35px Arial"; ctx.textAlign = "center"; ctx.fillText("❤️", b.x, b.y + 12 + bobbing);
                }
                
                if(!pickupDisplay.active && Math.sqrt((player.x-b.x)**2 + (player.y-b.y)**2) < 65) { 
                    if(b.type === 'weapon') {
                        player.weapon = b.content;
                        playGatchaSound(b.content.id);
                        pickupDisplay.active = true;
                        pickupDisplay.imgIdx = b.content.imgIdx;
                        pickupDisplay.gatchaIdx = b.content.gatchaIdx; 
                        pickupDisplay.timer = pickupDisplay.maxTimer;
                    }
                    else player.hp = Math.min(player.hp + 5, player.maxHp); 
                    bubbles.splice(i, 1); 
                }
            });

            if(!pickupDisplay.active && player.invul > 0) player.invul--;
            if(pW) {
                if (!pickupDisplay.active && frameCount % 8 === 0) player.animFrame = (player.animFrame + 1) % 8;
                const sx = (player.animFrame % SPRITE_COLS) * pW + INNER_PAD, sy = Math.floor(player.animFrame / SPRITE_COLS) * pH + INNER_PAD;
                ctx.save();
                ctx.translate(player.x, player.y);
                if(player.dir === -1) ctx.scale(-1, 1);
                if(player.invul % 4 < 2) ctx.drawImage(playerImg, sx, sy, pW-20, pH-20, -player.size/2, -player.size/2, player.size, player.size);
                ctx.restore();
            }
            
            if(!pickupDisplay.active) player.angle += 0.035;
            const currentWeaponCount = getWeaponCount();
            const wImg = weaponImages[player.weapon.imgIdx];

            for(let i=0; i<currentWeaponCount; i++) {
                const a = player.angle + (i * Math.PI * 2 / currentWeaponCount);
                const wx = player.x + Math.cos(a) * WEAPON_RADIUS; 
                const wy = player.y + Math.sin(a) * WEAPON_RADIUS;
                if(!pickupDisplay.active) {
                    weaponTrails[i].unshift({x: wx, y: wy});
                    if (weaponTrails[i].length > TRAIL_MAX_LENGTH) weaponTrails[i].pop();
                }
                const trail = weaponTrails[i];
                if (trail.length > 1) {
                    const offsets = [{ dist: -5, alpha: 0.2 }, { dist: 0, alpha: 0.4 }, { dist: 5, alpha: 0.2 }];
                    offsets.forEach(off => {
                        ctx.save(); ctx.translate(Math.cos(a)*off.dist, Math.sin(a)*off.dist);
                        for (let j = 0; j < trail.length - 1; j++) {
                            const raw = 1 - (j / trail.length);
                            const trapezoid = 0.35 + (Math.pow(raw, 0.5) * 0.65);
                            ctx.beginPath(); ctx.moveTo(trail[j].x, trail[j].y); ctx.lineTo(trail[j+1].x, trail[j+1].y);
                            ctx.lineWidth = WEAPON_SIZE * 0.56 * trapezoid; ctx.strokeStyle = `rgba(255, 215, 0, ${raw * 0.45 * off.alpha})`; ctx.stroke();
                        }
                        ctx.restore();
                    });
                }
                ctx.save(); ctx.translate(wx, wy); ctx.rotate(a + Math.PI/2); 
                if (wImg && wImg.complete) ctx.drawImage(wImg, -WEAPON_SIZE/2, -WEAPON_SIZE/2, WEAPON_SIZE, WEAPON_SIZE);
                ctx.restore();
            }

            ctx.fillStyle = "rgba(0,0,0,0.7)"; ctx.fillRect(player.x - 30, player.y + 55, 60, 8);
            ctx.fillStyle = "#00ff00"; ctx.fillRect(player.x - 30, player.y + 55, 60 * (player.hp/player.maxHp), 8);
            enemies.forEach(e => { e.update(); e.draw(); });
            
            if(trans.active) {
                if(!pickupDisplay.active) {
                    if(trans.state === 'in') { trans.x += (trans.targetX - trans.x) * 0.08; if(Math.abs(trans.x - trans.targetX) < 1) trans.state = 'hold'; }
                    else if(trans.state === 'hold') { trans.timer--; if(trans.timer <= 0) trans.state = 'out'; }
                    else { trans.x -= 18; if(trans.x < -1200) trans.active = false; }
                }
                ctx.font = "bold 55px serif"; ctx.textAlign = "left";
                trans.chars.forEach((c, i) => {
                    const cx = trans.x + i * 58; const cy = canvas.height/2;
                    ctx.strokeStyle = "#4a0000"; ctx.lineWidth = 12; ctx.strokeText(c, cx, cy);
                    ctx.fillStyle = "#ffd700"; ctx.fillText(c, cx, cy);
                });
            }
            
            effects.forEach((e, i) => {
                ctx.globalAlpha = e.life; ctx.fillStyle = e.color || "#ffd700";
                ctx.font = "bold 32px serif"; ctx.fillText(e.text, e.x, e.y);
                if(!pickupDisplay.active) { e.y -= 1.2; e.life -= 0.02; }
                if(e.life <= 0) effects.splice(i, 1);
            });

            if (pickupDisplay.active) {
                pickupDisplay.timer--;
                ctx.fillStyle = "rgba(0,0,0,0.75)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
                let opacity = Math.min(1, pickupDisplay.timer / 40);
                let scale = 1.0 + Math.sin(pickupDisplay.timer * 0.05) * 0.08; 
                let size = 450 * scale; 
                ctx.save(); ctx.globalAlpha = opacity;
                const grad = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 0, canvas.width/2, canvas.height/2, size);
                grad.addColorStop(0, "rgba(255, 215, 0, 0.6)"); grad.addColorStop(1, "rgba(255, 215, 0, 0)");
                ctx.fillStyle = grad; ctx.fillRect(0, 0, canvas.width, canvas.height);
                const bgImg = gatchaImages[pickupDisplay.gatchaIdx];
                if (bgImg && bgImg.complete) {
                    const bgW = size * 0.9; const bgH = bgW * 1.5;
                    ctx.drawImage(bgImg, canvas.width/2 - bgW/2, canvas.height/2 - bgH/2, bgW, bgH);
                }
                const pImg = weaponImages[pickupDisplay.imgIdx];
                if (pImg && pImg.complete) ctx.drawImage(pImg, canvas.width/2 - size/2, canvas.height/2 - size/2, size, size);
                ctx.font = "bold 60px serif"; ctx.textAlign = "center"; ctx.fillStyle = "#fff"; ctx.strokeStyle = "#4a0000"; ctx.lineWidth = 8;
                ctx.strokeText("新兵器獲得 !!", canvas.width/2, canvas.height/2 + (size * 0.8));
                ctx.fillText("新兵器獲得 !!", canvas.width/2, canvas.height/2 + (size * 0.8));
                ctx.restore();
                if (pickupDisplay.timer <= 0) pickupDisplay.active = false;
            }
            ctx.restore();
            requestAnimationFrame(loop);
        }

        function endGame(win) {
            gameActive = false;

            // ゲーム終了時にボスBGMを停止してリセット
            bossBgm.pause();
            bossBgm.currentTime = 0;

            if(win) {
                const winAudio = new Audio('win.wav');
                winAudio.volume = 0.5;
                winAudio.play().catch(e => {});

                resultScreen.style.backgroundImage = "url('last_bg.png')";
                winImgContainer.innerHTML = '<img src="win_title.png" alt="天下統一">';
                for(let i=0; i<80; i++) confetti.push({ x: Math.random()*canvas.width, y: -20, size: Math.random()*10+5, color: `hsl(${Math.random()*360}, 100%, 70%)`, vy: Math.random()*5+2, vx: (Math.random()-0.5)*3, angle: Math.random()*360, vAngle: Math.random()*10-5 });
            } else {
                const lostAudio = new Audio('lost.wav');
                lostAudio.volume = 0.5;
                lostAudio.play().catch(e => {});

                resultScreen.style.backgroundImage = "url('lost.png')";
                resMainText.innerText = "無念"; 
                resMainText.style.color = "#8e0000";
            }
            resultScreen.style.display = 'flex';
        }

        const handleInput = (ex, ey) => { 
            if(gameActive && !pickupDisplay.active){ 
                player.targetX = ex; 
                player.targetY = ey; 
            } 
        };
        window.addEventListener('mousemove', e => handleInput(e.clientX, e.clientY));
        window.addEventListener('touchmove', e => { e.preventDefault(); handleInput(e.touches[0].clientX, e.touches[0].clientY); }, {passive: false});
    </script>
</body>
</html>
