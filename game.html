<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ブレードマスター：サバイバル</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #5d9e3f; font-family: 'Arial Black', 'Hiragino Kaku Gothic ProN', sans-serif; user-select: none; touch-action: none; }
        canvas { display: block; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; color: white; }
        
        /* プレイヤーHP（ハート） */
        #hp-container { position: absolute; top: 40px; left: 20px; font-size: 24px; letter-spacing: 5px; }
        
        /* 経験値ゲージ */
        #exp-container { position: absolute; top: 15px; left: 5%; width: 90%; height: 12px; background: rgba(0,0,0,0.3); border-radius: 6px; overflow: hidden; }
        #exp-bar { width: 0%; height: 100%; background: #00f2fe; transition: width 0.1s; }
        
        /* 告知テロップ */
        #announce { position: absolute; top: 40%; width: 100%; text-align: center; font-size: 50px; font-weight: bold; transform: scale(0); transition: 0.4s cubic-bezier(0.17, 0.89, 0.32, 1.49); text-shadow: 0 0 20px #000; z-index: 10; }
        
        /* ゲームオーバー画面 */
        #game-over { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; flex-direction: column; align-items: center; justify-content: center; pointer-events: auto; }
        .retry-btn { padding: 20px 40px; background: #ffeb3b; color: #333; border: none; border-radius: 50px; font-size: 24px; font-weight: bold; cursor: pointer; animation: pulse 1s infinite; box-shadow: 0 0 20px rgba(255,235,59,0.5); }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="exp-container"><div id="exp-bar"></div></div>
        <div id="hp-container">❤️❤️❤️</div>
        <div id="announce">BOSS出現！</div>
    </div>

    <div id="game-over">
        <h1 style="color:white; font-size: 40px; margin-bottom: 10px;">GAME OVER</h1>
        <p style="color:#ccc; margin-bottom: 30px;">強力な武器を拾ってリベンジだ！</p>
        <button class="retry-btn" onclick="location.reload()">再挑戦（ストアへ）</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const expBar = document.getElementById('exp-bar');
        const hpDisplay = document.getElementById('hp-container');
        const announce = document.getElementById('announce');
        const gameOverScreen = document.getElementById('game-over');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const WEAPONS = [
            { id: 'banana', name: "伝説のバナナの皮", emoji: "🍌", power: 100, count: 6, color: "#ffff00" },
            { id: 'spoon', name: "魔王のしゃもじ", emoji: "🥄", power: 55, count: 4, color: "#ffffff" },
            { id: 'brush', name: "超振動ハブラシ", emoji: "🪥", power: 25, count: 8, color: "#00ffff" },
            { id: 'onion', name: "近所のネギ", emoji: "🌱", power: 12, count: 5, color: "#aaffaa" }
        ];

        let player = { x: canvas.width/2, y: canvas.height/2, hp: 3, maxHp: 3, exp: 0, weapon: WEAPONS[3], angle: 0, invul: 0 };
        let enemies = [];
        let bubbles = [];
        let effects = [];
        let isBossBattle = false;
        let gameActive = true;
        let lastDropTime = Date.now();

        // 武器と敵のOnTrigger状態管理用Map
        let hitTriggers = new Map();

        class Enemy {
            constructor(isBoss = false, id) {
                this.id = id;
                this.isBoss = isBoss;
                this.reset();
            }
            reset() {
                const angle = Math.random() * Math.PI * 2;
                this.x = player.x + Math.cos(angle) * (this.isBoss ? 600 : 500);
                this.y = player.y + Math.sin(angle) * (this.isBoss ? 600 : 500);
                this.maxHp = this.isBoss ? 3500 : 120;
                this.hp = this.maxHp;
                this.size = this.isBoss ? 140 : 35;
                this.emoji = this.isBoss ? "🍮" : "👾";
                this.vx = 0; this.vy = 0;
                hitTriggers.set(this.id, new Set()); // この敵に対するヒット状態を初期化
            }
            update() {
                if(!gameActive) return;
                this.x += this.vx; this.y += this.vy;
                this.vx *= 0.8; this.vy *= 0.8;

                const dx = player.x - this.x;
                const dy = player.y - this.y;
                const d = Math.sqrt(dx*dx + dy*dy);
                
                // 接近速度
                this.x += (dx/d) * (this.isBoss ? 0.9 : 2.2);
                this.y += (dy/d) * (this.isBoss ? 0.9 : 2.2);

                // プレイヤーへの接触ダメージ（継続判定）
                if (d < this.size + 10 && player.invul <= 0) takeDamage();

                // --- OnTrigger攻撃判定 ---
                const activeTriggers = hitTriggers.get(this.id);
                
                for(let i=0; i<player.weapon.count; i++) {
                    const a = player.angle + (i * Math.PI * 2 / player.weapon.count);
                    const wx = player.x + Math.cos(a) * 115;
                    const wy = player.y + Math.sin(a) * 115;
                    const dHit = Math.sqrt((this.x-wx)**2 + (this.y-wy)**2);
                    
                    const isTouching = dHit < this.size + 20;

                    if(isTouching) {
                        // OnTriggerEnter: 触れた瞬間に1回だけダメージ
                        if(!activeTriggers.has(i)) {
                            this.hp -= player.weapon.power;
                            addDamageText(this.x, this.y, player.weapon.power, player.weapon.color);
                            activeTriggers.add(i); 
                            
                            if(this.hp <= 0) {
                                this.die();
                                return; 
                            }
                        }
                    } else {
                        // OnTriggerExit: 離れたらフラグをリセット（次の回転でまた当たるようにする）
                        activeTriggers.delete(i);
                    }
                }
            }
            die() {
                if(this.isBoss) {
                    isBossBattle = false;
                    showAnnounce("完全勝利！");
                    setTimeout(() => { for(let i=0;i<8;i++) enemies.push(new Enemy(false, i)); }, 1000);
                } else {
                    player.exp += 25;
                    updateExp();
                }
                this.reset();
            }
            draw() {
                ctx.font = `${this.size}px Arial`;
                ctx.fillText(this.emoji, this.x - this.size/2, this.y + this.size/2);
                ctx.fillStyle = "rgba(0,0,0,0.5)";
                ctx.fillRect(this.x - 30, this.y - this.size - 5, 60, 6);
                ctx.fillStyle = this.isBoss ? "#ffeb3b" : "#ff5252";
                ctx.fillRect(this.x - 30, this.y - this.size - 5, 60 * (this.hp/this.maxHp), 6);
            }
        }

        function addDamageText(x, y, pwr, color) {
            effects.push({ x: x + (Math.random()-0.5)*50, y: y, text: pwr, color: color, size: 22 + (pwr/4), life: 1.2 });
        }

        function takeDamage() {
            player.hp--;
            player.invul = 60;
            hpDisplay.innerText = "❤️".repeat(player.hp);
            if(player.hp <= 0) { gameActive = false; gameOverScreen.style.display = "flex"; }
        }

        function updateExp() {
            expBar.style.width = player.exp + "%";
            if(player.exp >= 100 && !isBossBattle) {
                player.exp = 0;
                isBossBattle = true;
                enemies = [new Enemy(true, 0)];
                showAnnounce("BOSS出現！");
            }
        }

        function showAnnounce(txt) {
            announce.innerText = txt;
            announce.style.transform = "scale(1)";
            setTimeout(() => { announce.style.transform = "scale(0)"; }, 2000);
        }

        for(let i=0; i<8; i++) enemies.push(new Enemy(false, i));

        function loop() {
            if(!gameActive) return;
            ctx.fillStyle = "#5d9e3f";
            ctx.fillRect(0,0, canvas.width, canvas.height);

            if(player.invul > 0) player.invul--;

            // 武器バブルドロップ（画面に1つ制限）
            if(Date.now() - lastDropTime > 10000 && bubbles.length === 0) {
                bubbles.push({ x: Math.random()*(canvas.width-100)+50, y: Math.random()*(canvas.height-100)+50, weapon: WEAPONS[Math.floor(Math.random()*(WEAPONS.length-1))], t: 0 });
                lastDropTime = Date.now();
            }

            bubbles.forEach((b, i) => {
                b.t += 0.03;
                ctx.beginPath();
                ctx.arc(b.x, b.y, 45+Math.sin(b.t)*5, 0, Math.PI*2);
                ctx.fillStyle = "rgba(255,255,255,0.3)"; ctx.fill();
                ctx.font = "30px Arial"; ctx.fillText(b.weapon.emoji, b.x-15, b.y+10);
                if(Math.sqrt((player.x-b.x)**2 + (player.y-b.y)**2) < 65) {
                    player.weapon = b.weapon;
                    showAnnounce(b.weapon.name + "！");
                    bubbles.splice(i, 1);
                }
            });

            player.angle += 0.025; // 武器の回転速度
            enemies.forEach(e => { e.update(); e.draw(); });

            // プレイヤーとHPバー
            ctx.globalAlpha = (player.invul % 10 > 5) ? 0.4 : 1;
            ctx.font = "55px Arial"; ctx.fillText("😈", player.x-28, player.y+22);
            ctx.globalAlpha = 1;

            const pBarW = 60, pBarH = 8;
            ctx.fillStyle = "rgba(0,0,0,0.5)";
            ctx.fillRect(player.x - pBarW/2, player.y - 60, pBarW, pBarH);
            ctx.fillStyle = player.hp === 1 ? "#ff4444" : "#4ade80";
            ctx.fillRect(player.x - pBarW/2, player.y - 60, pBarW * (player.hp / player.maxHp), pBarH);

            // 武器の描画
            for(let i=0; i<player.weapon.count; i++) {
                const a = player.angle + (i * Math.PI * 2 / player.weapon.count);
                const wx = player.x + Math.cos(a) * 115;
                const wy = player.y + Math.sin(a) * 115;
                ctx.save();
                ctx.translate(wx, wy); ctx.rotate(a + Math.PI/2);
                ctx.font = "42px Arial"; ctx.fillText(player.weapon.emoji, -20, 20);
                ctx.restore();
            }

            // ダメージ数字
            effects.forEach((e, i) => {
                ctx.globalAlpha = e.life; ctx.fillStyle = e.color; ctx.font = `bold ${e.size}px Arial`;
                ctx.fillText(e.text, e.x, e.y);
                e.y -= 0.8; e.life -= 0.02;
                if(e.life <= 0) effects.splice(i, 1);
            });
            ctx.globalAlpha = 1;

            requestAnimationFrame(loop);
        }

        const move = (e) => {
            if(!gameActive) return;
            const x = e.touches ? e.touches[0].clientX : e.clientX;
            const y = e.touches ? e.touches[0].clientY : e.clientY;
            player.x = x; player.y = y;
        };
        window.addEventListener('mousemove', move);
        window.addEventListener('touchmove', move);

        loop();
    </script>
</body>
</html>
