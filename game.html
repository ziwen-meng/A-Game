<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blade Master: Easy & Impact Edition</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #5d9e3f; font-family: 'Arial Black', sans-serif; user-select: none; touch-action: none; }
        canvas { display: block; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; color: white; }
        #hp-container { position: absolute; top: 40px; left: 20px; font-size: 24px; letter-spacing: 5px; }
        #exp-container { position: absolute; top: 15px; left: 5%; width: 90%; height: 12px; background: rgba(0,0,0,0.3); border-radius: 6px; overflow: hidden; }
        #exp-bar { width: 0%; height: 100%; background: #00f2fe; transition: width 0.1s; }
        #announce { position: absolute; top: 40%; width: 100%; text-align: center; font-size: 50px; font-weight: bold; transform: scale(0); transition: 0.4s cubic-bezier(0.17, 0.89, 0.32, 1.49); text-shadow: 0 0 20px #000; z-index: 10; }
        #game-over { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; flex-direction: column; align-items: center; justify-content: center; pointer-events: auto; }
        .retry-btn { padding: 20px 40px; background: #ffeb3b; color: #333; border: none; border-radius: 50px; font-size: 24px; font-weight: bold; cursor: pointer; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="exp-container"><div id="exp-bar"></div></div>
        <div id="hp-container">❤️❤️❤️</div>
        <div id="announce">BOSS出現！</div>
    </div>

    <div id="game-over">
        <h1 style="color:white; font-size: 40px; margin-bottom: 10px;">完全勝利！</h1>
        <p style="color:#ccc; margin-bottom: 30px;">全ステージをアンロックしよう</p>
        <button class="retry-btn" onclick="location.reload()">今すぐダウンロード</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const expBar = document.getElementById('exp-bar');
        const hpDisplay = document.getElementById('hp-container');
        const announce = document.getElementById('announce');
        const gameOverScreen = document.getElementById('game-over');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const WEAPONS = [
            { id: 'banana', name: "伝説のバナナの皮", emoji: "🍌", power: 100, count: 6, color: "#ffff00" },
            { id: 'spoon', name: "魔王のしゃもじ", emoji: "🥄", power: 60, count: 4, color: "#ffffff" },
            { id: 'brush', name: "超振動ハブラシ", emoji: "🪥", power: 30, count: 8, color: "#00ffff" },
            { id: 'onion', name: "近所のネギ", emoji: "🌱", power: 20, count: 5, color: "#aaffaa" }
        ];

        let player = { x: canvas.width/2, y: canvas.height/2, hp: 3, maxHp: 3, exp: 0, weapon: WEAPONS[3], angle: 0, invul: 0 };
        let enemies = [];
        let bubbles = [];
        let effects = [];
        let isBossBattle = false;
        let gameActive = true;
        let lastDropTime = Date.now();
        
        let hitStopFrames = 0;
        let screenShake = 0;
        let hitTriggers = new Map();

        class Enemy {
            constructor(isBoss = false, id) {
                this.id = id;
                this.isBoss = isBoss;
                this.reset();
            }
            reset() {
                const angle = Math.random() * Math.PI * 2;
                this.x = player.x + Math.cos(angle) * (this.isBoss ? 500 : 400);
                this.y = player.y + Math.sin(angle) * (this.isBoss ? 500 : 400);
                this.maxHp = this.isBoss ? 1200 : 40; // ボスHPを大幅削減
                this.hp = this.maxHp;
                this.size = this.isBoss ? 160 : 35;
                this.emoji = this.isBoss ? "🍮" : "👾";
                this.vx = 0; this.vy = 0;
                this.flash = 0;
                hitTriggers.set(this.id, new Set());
            }
            update() {
                if(!gameActive) return;
                
                this.x += this.vx; this.y += this.vy;
                this.vx *= 0.8; this.vy *= 0.8;

                const dx = player.x - this.x;
                const dy = player.y - this.y;
                const d = Math.sqrt(dx*dx + dy*dy);
                
                // ボスはゆっくり、雑魚も控えめ
                const speed = this.isBoss ? 0.7 : 1.3;
                this.x += (dx/d) * speed;
                this.y += (dy/d) * speed;

                if (d < this.size + 10 && player.invul <= 0) takeDamage();

                const activeTriggers = hitTriggers.get(this.id);
                
                for(let i=0; i<player.weapon.count; i++) {
                    const a = player.angle + (i * Math.PI * 2 / player.weapon.count);
                    const wx = player.x + Math.cos(a) * 115;
                    const wy = player.y + Math.sin(a) * 115;
                    const dHit = Math.sqrt((this.x-wx)**2 + (this.y-wy)**2);
                    
                    const isTouching = dHit < this.size + 30; // 判定を広く

                    if(isTouching) {
                        if(!activeTriggers.has(i)) {
                            this.hp -= player.weapon.power;
                            addDamageText(this.x, this.y, player.weapon.power, player.weapon.color, this.isBoss);
                            activeTriggers.add(i); 
                            
                            if(this.isBoss) {
                                hitStopFrames = 8;
                                screenShake = 20; 
                                this.flash = 5;
                            }
                            
                            if(this.hp <= 0) {
                                this.die();
                                return; 
                            }
                        }
                    } else {
                        activeTriggers.delete(i);
                    }
                }
            }
            die() {
                if(this.isBoss) {
                    isBossBattle = false;
                    gameActive = false;
                    gameOverScreen.style.display = "flex";
                } else {
                    player.exp += 50; // 2体で即ボス
                    updateExp();
                }
                this.reset();
            }
            draw() {
                ctx.save();
                if(this.flash > 0) { ctx.filter = "brightness(3)"; this.flash--; }
                ctx.font = `${this.size}px Arial`;
                ctx.fillText(this.emoji, this.x - this.size/2, this.y + this.size/2);
                ctx.restore();

                ctx.fillStyle = "rgba(0,0,0,0.5)";
                ctx.fillRect(this.x - 40, this.y - this.size - 5, 80, 8);
                ctx.fillStyle = this.isBoss ? "#ffeb3b" : "#ff5252";
                ctx.fillRect(this.x - 40, this.y - this.size - 5, 80 * (this.hp/this.maxHp), 8);
            }
        }

        function addDamageText(x, y, pwr, color, isBoss) {
            const size = isBoss ? 40 + (pwr/2) : 22 + (pwr/4);
            effects.push({ x: x + (Math.random()-0.5)*80, y: y, text: pwr, color: color, size: size, life: 1.2 });
        }

        function takeDamage() {
            player.hp--;
            player.invul = 60;
            hpDisplay.innerText = "❤️".repeat(Math.max(0, player.hp));
            screenShake = 15;
            if(player.hp <= 0) { 
               announce.innerText = "GAMEOVER";
               announce.style.transform = "scale(1)";
               setTimeout(() => location.reload(), 1500);
            }
        }

        function updateExp() {
            expBar.style.width = player.exp + "%";
            if(player.exp >= 100 && !isBossBattle) {
                player.exp = 0;
                isBossBattle = true;
                enemies = [new Enemy(true, 0)];
                showAnnounce("BOSS出現！");
            }
        }

        function showAnnounce(txt) {
            announce.innerText = txt;
            announce.style.transform = "scale(1)";
            setTimeout(() => { announce.style.transform = "scale(0)"; }, 2000);
        }

        for(let i=0; i<4; i++) enemies.push(new Enemy(false, i));

        function loop() {
            if(!gameActive) {
                if(gameOverScreen.style.display === "flex") {
                     // 勝利時の背景描画だけ継続
                     ctx.fillStyle = "#5d9e3f";
                     ctx.fillRect(0, 0, canvas.width, canvas.height);
                }
                return;
            }

            if (hitStopFrames > 0) {
                hitStopFrames--;
                requestAnimationFrame(loop);
                return;
            }

            ctx.save();
            if (screenShake > 0) {
                ctx.translate((Math.random()-0.5)*screenShake, (Math.random()-0.5)*screenShake);
                screenShake *= 0.9;
            }

            ctx.fillStyle = "#5d9e3f";
            ctx.fillRect(-100, -100, canvas.width+200, canvas.height+200);

            if(player.invul > 0) player.invul--;

            // バブルドロップを早める（開始3秒でドロップ）
            if(Date.now() - lastDropTime > 3000 && bubbles.length === 0) {
                bubbles.push({ x: Math.random()*(canvas.width-100)+50, y: Math.random()*(canvas.height-100)+50, weapon: WEAPONS[Math.floor(Math.random()*(WEAPONS.length-1))], t: 0 });
                lastDropTime = Date.now();
            }

            bubbles.forEach((b, i) => {
                b.t += 0.03;
                ctx.beginPath();
                ctx.arc(b.x, b.y, 45+Math.sin(b.t)*5, 0, Math.PI*2);
                ctx.fillStyle = "rgba(255,255,255,0.4)"; ctx.fill();
                ctx.font = "35px Arial"; ctx.fillText(b.weapon.emoji, b.x-15, b.y+10);
                if(Math.sqrt((player.x-b.x)**2 + (player.y-b.y)**2) < 65) {
                    player.weapon = b.weapon;
                    showAnnounce(b.weapon.name + "！");
                    bubbles.splice(i, 1);
                }
            });

            player.angle += 0.025; 
            enemies.forEach(e => { e.update(); e.draw(); });

            ctx.globalAlpha = (player.invul % 10 > 5) ? 0.4 : 1;
            ctx.font = "55px Arial"; ctx.fillText("😈", player.x-28, player.y+22);
            ctx.globalAlpha = 1;

            const pBarW = 60, pBarH = 8;
            ctx.fillStyle = "rgba(0,0,0,0.5)";
            ctx.fillRect(player.x - pBarW/2, player.y - 60, pBarW, pBarH);
            ctx.fillStyle = "#4ade80";
            ctx.fillRect(player.x - pBarW/2, player.y - 60, pBarW * (player.hp / player.maxHp), pBarH);

            for(let i=0; i<player.weapon.count; i++) {
                const a = player.angle + (i * Math.PI * 2 / player.weapon.count);
                const wx = player.x + Math.cos(a) * 115;
                const wy = player.y + Math.sin(a) * 115;
                ctx.save();
                ctx.translate(wx, wy); ctx.rotate(a + Math.PI/2);
                ctx.font = "42px Arial"; ctx.fillText(player.weapon.emoji, -20, 20);
                ctx.restore();
            }

            effects.forEach((e, i) => {
                ctx.globalAlpha = e.life; ctx.fillStyle = e.color; ctx.font = `bold ${e.size}px Arial`;
                ctx.fillText(e.text, e.x, e.y);
                e.y -= 1.0; e.life -= 0.02;
                if(e.life <= 0) effects.splice(i, 1);
            });

            ctx.restore();
            requestAnimationFrame(loop);
        }

        const move = (e) => {
            if(!gameActive) return;
            const x = e.touches ? e.touches[0].clientX : e.clientX;
            const y = e.touches ? e.touches[0].clientY : e.clientY;
            player.x = x; player.y = y;
        };
        window.addEventListener('mousemove', move);
        window.addEventListener('touchmove', move);

        loop();
    </script>
</body>
</html>
